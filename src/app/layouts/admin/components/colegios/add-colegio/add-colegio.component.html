<div class="student-container">
  <div class="form-row">
    <mat-card class="form-card">
      <mat-card-header>
        <mat-card-title style="padding-bottom: 20px; padding-top: 5px; font-weight: bold;">AGREGAR NUEVO
          COLEGIO</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <form [formGroup]="colegioForm">
          <mat-form-field class="full-width">
            <mat-label>Nombre del Colegio *</mat-label>
            <input matInput formControlName="nombre" required>
          </mat-form-field>

          <mat-form-field class="full-width">
            <mat-label>Dirección *</mat-label>
            <input matInput formControlName="direccion" required>
          </mat-form-field>

          <mat-form-field class="full-width">
            <mat-label>Celular *</mat-label>
            <input matInput formControlName="celular" required [errorStateMatcher]="customErrorStateMatcher">
          </mat-form-field>

          <div class="image-upload-container">
            <mat-label class="upload-label">Imagen del Colegio</mat-label>
            <div class="upload-wrapper" (click)="triggerFileInput()">
              <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" style="display: none;">

              <div *ngIf="!imagePreview" class="upload-placeholder">
                <mat-icon>add_photo_alternate</mat-icon>
                <span>Seleccionar Imagen</span>
              </div>

              <div *ngIf="imagePreview" class="image-preview">
                <img [src]="imagePreview" alt="Vista previa">
                <div class="change-overlay">
                  <mat-icon>edit</mat-icon>
                  <span>Cambiar</span>
                </div>
              </div>
            </div>
          </div>

          <div class="button-container">
            <button mat-raised-button color="primary" class="submit-button" (click)="onSubmit()" [disabled]="loading">
              <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
              <span *ngIf="!loading">Guardar</span>
            </button>
            <button mat-button class="back-button" (click)="onCancel()">Cancelar</button>
          </div>
        </form>
        <div *ngIf="error" class="error-message">{{ error }}</div>
        <div *ngIf="successMessage" class="success-message">{{ successMessage }}</div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
