<div class="dialog-container">
  <h2 mat-dialog-title class="dialog-title">AGREGAR NUEVO COLEGIO</h2>
  
  <mat-dialog-content class="dialog-content">
    <form [formGroup]="colegioForm" class="colegio-form">
      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Nombre del Colegio</mat-label>
        <input matInput formControlName="nombre" required placeholder="Ej: Colegio San Carlos">
      </mat-form-field>

      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Dirección</mat-label>
        <input matInput formControlName="direccion" required placeholder="Ej: Av. Principal 123">
      </mat-form-field>

      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Celular</mat-label>
        <input matInput formControlName="celular" required [errorStateMatcher]="customErrorStateMatcher" placeholder="Ej: 987654321">
        <mat-hint>9 dígitos</mat-hint>
      </mat-form-field>

      <div class="image-upload-section">
        <label class="section-label">Imagen del Colegio</label>
        <div class="upload-zone" (click)="triggerFileInput()">
          <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" style="display: none;">

          <div *ngIf="!imagePreview" class="upload-hint">
            <mat-icon>cloud_upload</mat-icon>
            <span>Subir imagen</span>
          </div>

          <div *ngIf="imagePreview" class="image-preview-box">
            <img [src]="imagePreview" alt="Vista previa">
            <div class="overlay">
              <mat-icon>refresh</mat-icon>
              <span>Cambiar imagen</span>
            </div>
          </div>
        </div>
      </div>
    </form>
    
    <div *ngIf="error" class="error-box">
      <mat-icon>error_outline</mat-icon>
      <span>{{ error }}</span>
    </div>
    <div *ngIf="successMessage" class="success-box">
      <mat-icon>check_circle_outline</mat-icon>
      <span>{{ successMessage }}</span>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end" class="dialog-actions">
    <button mat-button (click)="onCancel()" [disabled]="loading">Cancelar</button>
    <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="loading || colegioForm.invalid">
      <mat-spinner *ngIf="loading" diameter="20" class="btn-spinner"></mat-spinner>
      <span *ngIf="!loading">Guardar Colegio</span>
    </button>
  </mat-dialog-actions>
</div>
