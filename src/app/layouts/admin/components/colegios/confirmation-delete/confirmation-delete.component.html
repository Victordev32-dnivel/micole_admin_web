<div class="dialog-container">
  <h2 mat-dialog-title class="dialog-title delete-title">Confirmar Eliminación</h2>
  
  <mat-dialog-content class="dialog-content">
    <div class="delete-confirmation-msg">
      <mat-icon class="warning-icon">warning</mat-icon>
      <p>{{ data.message }}</p>
    </div>
    
    <div *ngIf="error" class="error-box">
      <mat-icon>error_outline</mat-icon>
      <span>{{ error }}</span>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end" class="dialog-actions">
    <button mat-button (click)="onCancel()" [disabled]="loading">Cancelar</button>
    <button mat-raised-button color="warn" (click)="onConfirm()" [disabled]="loading">
      <mat-spinner *ngIf="loading" diameter="20" class="btn-spinner"></mat-spinner>
      <span *ngIf="!loading">Eliminar permanentemente</span>
    </button>
  </mat-dialog-actions>
</div>
